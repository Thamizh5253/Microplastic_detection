<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 CAM Setup - Microplastic AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>
    <header>
        <h1>ESP32 CAM Configuration</h1>
        <p>Set the IP address of your ESP32 CAM module</p>
    </header>

    <main>
        <section class="upload-section">
            <form method="post">
                <div class="file-input-wrapper">
                    <label for="esp32_ip">ESP32 IP Address</label>
                    <input type="text" name="esp32_ip" id="esp32_ip" value="{{ esp32_ip }}"
                        placeholder="e.g., 192.168.1.100" required>
                </div>
                <input type="submit" value="Save Configuration" class="btn-submit" style="margin-top: 15px;">
            </form>

            {% if message %}
            <div class="success-box" style="margin-top: 20px; color: green; font-weight: bold;">
                <p>{{ message }}</p>
            </div>
            {% endif %}

            <div style="margin-top: 20px;">
                <a href="{{ url_for('index') }}" class="btn-secondary" style="text-decoration: none; color: #444;">←
                    Back to Home</a>
            </div>
        </section>
    </main>
</body>

</html>
